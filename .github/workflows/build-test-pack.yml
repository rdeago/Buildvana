name: Build, test, and pack

permissions:
  contents: read
  packages: read

on:
  push:
    branches: [ main, develop, hotfix/*, dev/*, 'v[0-9]+.[0-9]+' ]
  pull_request:
    branches: [ main, develop, hotfix/*, dev/*, 'v[0-9]+.[0-9]+' ]

jobs:
  build_test_pack:
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
      DOTNET_CLI_UI_LANGUAGE: 'en-US'
      FEEDZ_IO_PRIVATE_TOKEN: ${{ secrets.FEEDZ_IO_PRIVATE_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
    - name: Set bogus local NuGet package directory
      shell: bash
      run: echo "NUGET_LOCAL_PACKAGES=$RUNNER_TEMP" >> "$GITHUB_ENV"
    - name: Checkout repository with full history
      uses: actions/checkout@v6
      with:
        fetch-depth: 0 # Checkout with full history so nbgv can compute Git height correctly.
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json
        cache: true
        cache-dependency-path: |
          global.json
          .config/dotnet-tools.json
          Directory.Packages.props
    - name: Restore .NET tools
      shell: bash
      run: dotnet tool restore
    - name: Verify buildvana.json schema is up to date
      shell: bash
      run: dotnet run tools/generate-config-schema.cs -- --check
    - name: Build, test, and pack with Buildvana
      shell: bash
      run: |
        if [ -z "$BV_VERBOSITY" ]; then BV_VERBOSITY=Normal; fi
        if [ "$RUNNER_DEBUG" = "1" ]; then BV_VERBOSITY=Diagnostic; fi
        dotnet bv pack --verbosity "$BV_VERBOSITY"
    - name: Upload coverage to Codecov
      if: ${{ hashFiles('TestResults/*.cobertura.xml') != '' }}
      uses: codecov/codecov-action@v6
      with:
        working-directory: TestResults
        files: '*.cobertura.xml'
        verbose: true
